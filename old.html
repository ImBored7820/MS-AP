function useHashRoute() {
  const [route, setRoute] = useState(window.location.hash.slice(1) || "/");
  useEffect(() => {
    const fn = () => setRoute(window.location.hash.slice(1) || "/");
    window.addEventListener("hashchange", fn);
    return () => window.removeEventListener("hashchange", fn);
  }, []);
  return route;
}
function nav(p) { window.location.hash = p; window.scrollTo({ top: 0, behavior: "smooth" }); }

            {["All", ...CATEGORIES.map((c) => c.name)].map((c) => (
              <button key={c} onClick={() => setCat(c)} style={{ padding: "7px 14px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 500, fontFamily: "'Outfit', sans-serif", background: cat === c ? C.sage : C.card, color: cat === c ? "#fff" : C.textMid, border: `1px solid ${cat === c ? C.sage : C.border}`, transition: "all 0.2s" }}>{c}</button>
            ))}
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 12 }}>
          {filtered.map((course, i) => <CourseCard key={course.slug} course={course} i={i} />)}
        </div>
        {filtered.length === 0 && <div style={{ textAlign: "center", padding: "48px 20px", color: C.textLight, fontSize: 14 }}>No courses match your search.</div>}
      </section>
    </Shell>
  );
}

function CourseCard({ course, i }) {

        <svg style={{ opacity: h ? 0.7 : 0.2, transition: "opacity 0.2s", flexShrink: 0, marginTop: 3 }} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="2.5" strokeLinecap="round"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

}

// ── Course Page ──
function CoursePage({ slug }) {
  const course = ALL_COURSES.find((c) => c.slug === slug);
  if (!course) return (<Shell><div style={{ padding: "100px 28px", textAlign: "center" }}><h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 28, color: C.forest }}>Course not found</h2><button onClick={() => nav("/")} style={{ marginTop: 16, padding: "9px 20px", background: C.sage, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontFamily: "'Outfit', sans-serif", fontWeight: 500 }}>Back to Courses</button></div></Shell>);

        <span style={{ opacity: 0.4 }}>/</span>

        <span style={{ color: C.text }}>{course.title}</span>

        <div className="fu">
          <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
            <Tag variant="accent">{course.examDate}</Tag>
            <Tag variant="muted">{course.examTime} Session</Tag>
            {course.units > 0 && <Tag>{course.units} Units</Tag>}

          </div>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 36, fontWeight: 500, lineHeight: 1.15, letterSpacing: "-0.01em", color: C.forest, marginBottom: 12 }}>{course.title}</h1>
          <p style={{ fontSize: 16, color: C.textMid, lineHeight: 1.65, maxWidth: 640 }}>{course.desc}</p>

      </section>
      <section style={{ padding: "0 28px 48px", maxWidth: 1200, margin: "0 auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 28, alignItems: "start" }}>
          <div>
            <Block title="Course Overview">

            <Block title="Exam Format">
              {scoring && scoring.mcWeight > 0 ? (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <FCard section="Multiple Choice" detail={`${scoring.mcWeight}% of composite score`} />
                  <FCard section="Free Response" detail={`${scoring.frqWeight}% of composite score`} />
                </div>
              ) : <FCard section="Performance Tasks / Portfolio" detail="100% of composite score" />}

              {course.units > 0 ? (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {Array.from({ length: course.units }, (_, i) => (
                    <div key={i} style={{ padding: "12px 16px", background: C.bgWarm, borderRadius: 10, display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 26, height: 26, borderRadius: 7, background: C.sageLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: C.sage }}>{i + 1}</div>
                      <div><div style={{ fontSize: 14, fontWeight: 500, color: C.text }}>Unit {i + 1}</div><div style={{ fontSize: 12, color: C.textLight }}>Topics coming soon</div></div>

              ) : <p style={{ color: C.textLight, fontSize: 14 }}>This course uses a portfolio-based assessment.</p>}
            </Block>
            <Block title="Study Resources">
              <Placeholder lines={3} />
              <p style={{ marginTop: 12, fontSize: 13, color: C.textLight, fontStyle: "italic" }}>Curated study materials, practice questions, and recommended resources will appear here.</p>
            </Block>
          </div>
          <div style={{ position: "sticky", top: 76, display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ background: C.card, border: `1px solid ${C.borderSoft}`, borderRadius: 14, padding: 22, boxShadow: C.shadow }}>
              <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 500, color: C.forest, marginBottom: 14 }}>Exam Details</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <DRow label="Date" value={course.examDate} />
                <DRow label="Session" value={course.examTime} />
                <DRow label="Units" value={course.units > 0 ? course.units : "Portfolio"} />
                <DRow label="Duration" value="~3 hours" />
                <DRow label="Score Range" value="1 -- 5" />
                {scoring && scoring.mcWeight > 0 && <DRow label="MC / FRQ" value={`${scoring.mcWeight}% / ${scoring.frqWeight}%`} />}
              </div>
            </div>
            <div style={{ background: C.sagePale, border: `1px solid ${C.sageLight}`, borderRadius: 14, padding: 22 }}>
              <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 500, color: C.forest, marginBottom: 6 }}>Score Predictor</h3>
              <p style={{ fontSize: 13, color: C.textMid, marginBottom: 14 }}>Estimate your AP score based on practice performance.</p>
              <button onClick={() => nav("/predictor")} style={{ width: "100%", padding: "9px 18px", background: C.sage, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: "'Outfit', sans-serif" }}>Try Score Predictor</button>
            </div>
            <div style={{ background: C.card, border: `1px solid ${C.borderSoft}`, borderRadius: 14, padding: 22, boxShadow: C.shadow }}>
              <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 500, color: C.forest, marginBottom: 10 }}>Related Courses</h3>
              {category?.courses.filter((c) => c.slug !== slug).slice(0, 4).map((c) => (
                <div key={c.slug} onClick={() => nav(`/course/${c.slug}`)} style={{ padding: "8px 0", borderBottom: `1px solid ${C.borderSoft}`, cursor: "pointer", fontSize: 13, color: C.textMid, transition: "color 0.15s" }}
                  onMouseEnter={(e) => e.currentTarget.style.color = C.sage} onMouseLeave={(e) => e.currentTarget.style.color = C.textMid}>{c.title}</div>
              ))}

          </div>
        </div>
      </section>
    </Shell>
  );
}

function Block({ title, children }) {
  return (<div className="fu" style={{ marginBottom: 28 }}><h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 21, fontWeight: 500, color: C.forest, marginBottom: 14, paddingBottom: 10, borderBottom: `1px solid ${C.border}` }}>{title}</h2>{children}</div>);
}
function FCard({ section, detail }) {
  return (<div style={{ padding: 16, background: C.bgWarm, borderRadius: 10 }}><div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 3 }}>{section}</div><div style={{ fontSize: 13, color: C.textLight }}>{detail}</div></div>);
}
function DRow({ label, value }) {
  return (<div style={{ display: "flex", justifyContent: "space-between", paddingBottom: 8, borderBottom: `1px solid ${C.borderSoft}`, fontSize: 13 }}><span style={{ color: C.textLight }}>{label}</span><span style={{ fontWeight: 500, color: C.text }}>{value}</span></div>);
}
function Placeholder({ lines = 4 }) {
  return (<div style={{ display: "flex", flexDirection: "column", gap: 7 }}>{Array.from({ length: lines }, (_, i) => (<div key={i} style={{ height: 10, borderRadius: 5, background: C.borderSoft, width: i === lines - 1 ? "55%" : `${82 + Math.random() * 18}%` }} />))}</div>);
}

// ── Score Predictor ──
function PredictorPage() {
  const [slug, setSlug] = useState("");
  const [mcVal, setMcVal] = useState(50);
  const [frqVal, setFrqVal] = useState(50);
  const [result, setResult] = useState(null);
  const scoring = SCORING[slug];

  const predict = () => {
    if (!scoring) return;
    const mcPct = mcVal / 100;
    const frqPct = frqVal / 100;
    const composite = (mcPct * scoring.mcWeight + frqPct * scoring.frqWeight) / 100;
    const compositePct = Math.round(composite * 100);
    const [c5, c4, c3, c2] = scoring.cutoffs;
    let score = compositePct >= c5 ? 5 : compositePct >= c4 ? 4 : compositePct >= c3 ? 3 : compositePct >= c2 ? 2 : 1;
    setResult({ score, compositePct });
  };

  const sliderBg = (val) => `linear-gradient(90deg, ${C.sage} 0%, ${C.sage} ${val}%, ${C.borderSoft} ${val}%, ${C.borderSoft} 100%)`;
  const scoreLabels = { 5: "Extremely well qualified", 4: "Well qualified", 3: "Qualified", 2: "Possibly qualified", 1: "No recommendation" };

  return (
    <Shell>
      <section style={{ padding: "40px 28px", maxWidth: 680, margin: "0 auto" }}>
        <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 26, fontWeight: 500, color: C.forest, marginBottom: 4 }}>AP Score Predictor</h2>
        <p style={{ fontSize: 14, color: C.textLight, marginBottom: 28 }}>
          Estimate your AP score using subject-specific MC/FRQ weightings from College Board course descriptions. Cutoffs are approximate and shift each year.
        </p>
        <div className="fu" style={{ background: C.card, border: `1px solid ${C.borderSoft}`, borderRadius: 14, padding: 28, boxShadow: C.shadow }}>
          <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: C.textMid, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>Select Course</label>
          <select value={slug} onChange={(e) => { setSlug(e.target.value); setResult(null); }} style={{ width: "100%", padding: "10px 12px", background: C.bgWarm, border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, fontSize: 14, fontFamily: "'Outfit', sans-serif", outline: "none", marginBottom: 24, cursor: "pointer" }}>
            <option value="">-- Select a course --</option>
            {CATEGORIES.map((ct) => (
              <optgroup key={ct.name} label={ct.name}>
                {ct.courses.map((c) => <option key={c.slug} value={c.slug}>{c.title}</option>)}
              </optgroup>
            ))}
          </select>

          {scoring && (
            <>
              <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
                {scoring.mcWeight > 0 && (
                  <div style={{ flex: scoring.mcWeight, background: C.sagePale, borderRadius: 8, padding: "10px 14px", textAlign: "center" }}>
                    <div style={{ fontSize: 20, fontWeight: 600, color: C.forest }}>{scoring.mcWeight}%</div>
                    <div style={{ fontSize: 11, color: C.textLight, fontWeight: 500 }}>Multiple Choice</div>
                  </div>
                )}
                <div style={{ flex: scoring.frqWeight, background: C.mintSoft, borderRadius: 8, padding: "10px 14px", textAlign: "center" }}>
                  <div style={{ fontSize: 20, fontWeight: 600, color: C.forest }}>{scoring.frqWeight}%</div>
                  <div style={{ fontSize: 11, color: C.textLight, fontWeight: 500 }}>Free Response</div>
                </div>
              </div>

              {scoring.mcWeight > 0 && (
                <div style={{ marginBottom: 22 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <label style={{ fontSize: 13, fontWeight: 600, color: C.text }}>Multiple Choice Accuracy</label>
                    <span style={{ fontSize: 14, fontWeight: 700, color: C.sage }}>{mcVal}%</span>
                  </div>
                  <input type="range" min="0" max="100" value={mcVal} onChange={(e) => setMcVal(+e.target.value)} style={{ width: "100%", background: sliderBg(mcVal) }} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.textLight, marginTop: 4 }}><span>0%</span><span>50%</span><span>100%</span></div>
                </div>
              )}

              <div style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: C.text }}>Free Response Score</label>
                  <span style={{ fontSize: 14, fontWeight: 700, color: C.sage }}>{frqVal}%</span>
                </div>
                <input type="range" min="0" max="100" value={frqVal} onChange={(e) => setFrqVal(+e.target.value)} style={{ width: "100%", background: sliderBg(frqVal) }} />
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.textLight, marginTop: 4 }}><span>0%</span><span>50%</span><span>100%</span></div>
              </div>

              <button onClick={predict} style={{ width: "100%", padding: "11px 22px", background: C.sage, color: "#fff", border: "none", borderRadius: 10, cursor: "pointer", fontSize: 15, fontWeight: 600, fontFamily: "'Outfit', sans-serif" }}>Predict My Score</button>

              {result && (
                <div className="fu" style={{ marginTop: 22, padding: 26, background: C.sagePale, borderRadius: 12, textAlign: "center" }}>
                  <div style={{ fontSize: 12, color: C.textLight, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>Estimated Score</div>
                  <div style={{ fontFamily: "'Fraunces', serif", fontSize: 64, fontWeight: 500, color: C.forest, lineHeight: 1 }}>{result.score}</div>
                  <div style={{ fontSize: 14, color: C.sage, fontWeight: 600, marginTop: 6 }}>{scoreLabels[result.score]}</div>
                  <div style={{ fontSize: 13, color: C.textMid, marginTop: 4 }}>Weighted Composite: {result.compositePct}%</div>
                  <div style={{ display: "flex", gap: 4, marginTop: 16, justifyContent: "center" }}>
                    {[1, 2, 3, 4, 5].map((s) => (<div key={s} style={{ width: 44, height: 6, borderRadius: 3, background: s <= result.score ? C.sage : C.borderSoft, transition: "background 0.3s" }} />))}
                  </div>
                  <div style={{ marginTop: 14, fontSize: 12, color: C.textLight, lineHeight: 1.5 }}>
                    {result.score >= 3 ? "A score of 3+ is generally considered qualifying for college credit at many institutions." : "Keep studying! Focus on your weaker section to bring up your composite."}
                  </div>
                </div>
              )}
            </>
          )}
        </div>

        <div className="fu" style={{ marginTop: 16, padding: 18, background: C.sagePale, borderRadius: 12, fontSize: 13, color: C.textMid, lineHeight: 1.65 }}>
          <strong style={{ color: C.forest }}>How this works:</strong> Each AP exam weights MC and FRQ sections differently. For example, History exams weight FRQ at 60% while Economics exams weight MC at 67%. Your percentage scores are weighted accordingly to produce a composite, then compared against approximate cutoffs derived from historical exam data. The College Board does not publish exact cutoffs and they shift yearly, so treat this as a rough guide only.
        </div>
      </section>
    </Shell>
  );
}

// ── Router ──
function App() {
  const route = useHashRoute();
  let page;
  if (route.startsWith("/course/")) page = <CoursePage slug={route.replace("/course/", "")} />;
  else if (route === "/schedule") page = <SchedulePage />;
  else if (route === "/predictor") page = <PredictorPage />;
  else page = <HomePage />;
  return (<><style>{globalCSS}</style>{page}</>);
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
